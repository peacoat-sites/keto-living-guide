<script>
(function(){
  var rawEl=document.getElementById('kfn-raw');
  var DATA=JSON.parse(rawEl.getAttribute('data-rows'));
  var filtered=DATA.slice();
  var sortKey='net_carbs',sortAsc=true;
  var catSel=document.getElementById('kfn-cat');
  var friendMode='all';
  var cats=[...new Set(DATA.map(r=>r.category))].sort();
  cats.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;catSel.appendChild(o);});
  function render(){
    var tbody=document.getElementById('kfn-body');
    tbody.innerHTML='';
    filtered.forEach(function(r){
      var bg=r.keto_friendly.startsWith('Yes')?'#e6f4ea':r.keto_friendly.startsWith('Mod')?'#fff8e6':'#fde8e8';
      var tr=document.createElement('tr');
      tr.innerHTML='<td style="padding:9px 12px;border-bottom:1px solid var(--border);font-weight:600">'+r.food+'</td>'
        +'<td style="padding:9px 12px;border-bottom:1px solid var(--border);color:var(--muted)">'+r.serving+'</td>'
        +'<td style="padding:9px 12px;border-bottom:1px solid var(--border);text-align:right;font-weight:700;color:var(--accent)">'+r.net_carbs+'</td>'
        +'<td style="padding:9px 12px;border-bottom:1px solid var(--border);text-align:right">'+r.calories+'</td>'
        +'<td style="padding:9px 12px;border-bottom:1px solid var(--border);text-align:right">'+r.fat+'</td>'
        +'<td style="padding:9px 12px;border-bottom:1px solid var(--border);text-align:right">'+r.protein+'</td>'
        +'<td style="padding:9px 12px;border-bottom:1px solid var(--border);color:var(--muted)">'+r.category+'</td>'
        +'<td style="padding:9px 12px;border-bottom:1px solid var(--border)"><span style="padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;background:'+bg+'">'+r.keto_friendly+'</span></td>';
      tbody.appendChild(tr);
    });
    document.getElementById('kfn-count').textContent='Showing '+filtered.length+' of '+DATA.length+' foods';
  }
  window.kfnFilter=function(){
    var q=(document.getElementById('kfn-search').value||'').toLowerCase();
    var cat=catSel.value;
    filtered=DATA.filter(function(r){
      var matchQ=!q||r.food.toLowerCase().includes(q)||r.category.toLowerCase().includes(q);
      var matchCat=!cat||r.category===cat;
      var matchF=friendMode==='all'||(friendMode==='yes'&&r.keto_friendly.startsWith('Yes'))||(friendMode==='mod'&&r.keto_friendly.startsWith('Mod'))||(friendMode==='no'&&r.keto_friendly.startsWith('No'));
      return matchQ&&matchCat&&matchF;
    });
    filtered.sort(function(a,b){var v=a[sortKey]<b[sortKey]?-1:a[sortKey]>b[sortKey]?1:0;return sortAsc?v:-v;});
    render();
  };
  window.kfnSort=function(key){if(sortKey===key)sortAsc=!sortAsc;else{sortKey=key;sortAsc=key==='food';}kfnFilter();};
  window.kfnSetFriend=function(mode){
    friendMode=mode;
    ['all','yes','mod','no'].forEach(function(m){
      var btn=document.getElementById('kfn-f-'+m);
      if(m===mode){btn.style.background='var(--accent)';btn.style.color='#fff';btn.style.borderColor='var(--accent)';}
      else{btn.style.background='var(--surface)';btn.style.color='var(--text)';btn.style.borderColor='var(--border-strong)';}
    });
    kfnFilter();
  };
  filtered.sort(function(a,b){return a.net_carbs-b.net_carbs;});
  render();
})();
</script>

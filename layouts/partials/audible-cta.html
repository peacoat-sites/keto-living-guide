{{ $a := site.Data.promos.audible }}
{{ if and $a $a.url (lt now (time "2026-12-31")) }}
<div class="audible-cta-strip" style="display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#1a1207 0%,#3d2a08 100%);border-radius:10px;padding:16px 20px;margin:2rem 0;flex-wrap:wrap">
  <div style="font-size:2rem;flex-shrink:0">🎧</div>
  <div style="flex:1;min-width:220px">
    <div style="font-weight:700;color:#fef3c7;font-size:.95rem;margin-bottom:4px">{{ $a.label }}</div>
    <div style="color:#fde68a;font-size:.83rem;line-height:1.4;opacity:.85">{{ $a.blurb }}</div>
  </div>
  <a href="{{ $a.url }}" rel="sponsored noopener" target="_blank"
     style="display:inline-block;background:#f59e0b;color:#1a1207;font-weight:700;font-size:.85rem;padding:10px 18px;border-radius:8px;text-decoration:none;white-space:nowrap;flex-shrink:0">
    {{ $a.cta }}
  </a>
</div>
{{ end }}

name: Refresh Keto Food Data
on:
  schedule:
    - cron: '0 6 1 * *'   # monthly, 1st of month
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch USDA macros
        env:
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}   # optional; falls back to DEMO_KEY
        run: python pipeline/fetch_keto.py data/keto_foods.json
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/keto_foods.json || true
          git diff --staged --quiet || git commit -m "chore: refresh keto food macros from USDA"
          git push || true
